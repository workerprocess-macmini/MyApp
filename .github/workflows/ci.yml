name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    
permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests
        run: |
          dotnet test tests/MyApp.Domain.Tests \
            --no-build --configuration Release \
            --logger "trx;LogFileName=domain-tests.trx" \
            --logger "console;verbosity=normal"

          dotnet test tests/MyApp.Application.Tests \
            --no-build --configuration Release \
            --logger "trx;LogFileName=application-tests.trx" \
            --logger "console;verbosity=normal"

      - name: Integration tests
        env:
          ASPNETCORE_ENVIRONMENT: IntegrationTest
        run: |
          dotnet test tests/MyApp.IntegrationTests \
            --no-build --configuration Release \
            --logger "trx;LogFileName=integration-tests.trx" \
            --logger "console;verbosity=normal"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: '**/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
